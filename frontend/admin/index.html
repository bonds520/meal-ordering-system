<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理員後台 - 員工訂餐系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            font-weight: 500;
            color: #666;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: #e8e8e8;
            color: #333;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .content {
            padding: 30px;
            min-height: 500px;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .stat-card h3 {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .stat-card .subtext {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 5px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .data-table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }
        
        .data-table tr:hover {
            background: #f9f9f9;
        }
        
        .data-table tr:last-child td {
            border-bottom: none;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: #48bb78;
            color: white;
        }
        
        .btn-success:hover {
            background: #38a169;
        }
        
        .btn-danger {
            background: #f56565;
            color: white;
        }
        
        .btn-danger:hover {
            background: #e53935;
        }
        
        .btn-secondary {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .btn-secondary:hover {
            background: #cbd5e0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h2 {
            font-size: 1.5rem;
            color: #333;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #666;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-badge.pending {
            background: #feebc8;
            color: #734202;
        }
        
        .status-badge.cancelled {
            background: #fed7d7;
            color: #822727;
        }
        
        .status-badge.picked-up {
            background: #bee3f8;
            color: #2c5282;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading::after {
            content: '';
            width: 30px;
            height: 30px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .file-upload {
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-upload:hover {
            border-color: #667eea;
            background: #f7fafc;
        }
        
        .file-upload input[type="file"] {
            display: none;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1001;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            background: #48bb78;
        }
        
        .toast.error {
            background: #f56565;
        }
        
        .toast.info {
            background: #4299e1;
        }
        
        .restaurant-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .restaurant-stat {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .restaurant-stat h4 {
            color: #667eea;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        
        .restaurant-stat .count {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }
        
        .restaurant-stat .amount {
            color: #666;
            font-size: 0.9rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍱 員工訂餐系統</h1>
            <p>管理員後台</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="dashboard">📊 儀表板</button>
            <button class="tab" data-tab="orders">📋 訂單管理</button>
            <button class="tab" data-tab="menu">🍽️ 菜單管理</button>
            <button class="tab" data-tab="restaurants">🏪 餐廳管理</button>
            <button class="tab" data-tab="users">👥 用戶管理</button>
            <button class="tab" data-tab="settings">⚙️ 系統設定</button>
        </div>
        
        <div class="content">
            <!-- 儀表板 -->
            <div id="dashboard" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>今日訂單</h3>
                        <div class="value" id="total-orders">0</div>
                        <div class="subtext">筆</div>
                    </div>
                    <div class="stat-card">
                        <h3>總金額</h3>
                        <div class="value" id="total-amount">$0</div>
                        <div class="subtext">NTD</div>
                    </div>
                    <div class="stat-card">
                        <h3>總補助</h3>
                        <div class="value" id="total-subsidy">$0</div>
                        <div class="subtext">NTD</div>
                    </div>
                    <div class="stat-card">
                        <h3>總自付</h3>
                        <div class="value" id="total-self-pay">$0</div>
                        <div class="subtext">NTD</div>
                    </div>
                </div>
                
                <h2 style="margin-bottom: 20px;">餐廳統計</h2>
                <div class="restaurant-stats" id="restaurant-stats">
                    <!-- 動態內容 -->
                </div>
            </div>
            
            <!-- 訂單管理 -->
            <div id="orders" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>訂單列表</h2>
                    <button class="btn btn-primary" onclick="refreshOrders()">🔄 重新整理</button>
                </div>
                
                <div id="orders-container">
                    <!-- 動態內容 -->
                </div>
            </div>
            
            <!-- 菜單管理 -->
            <div id="menu" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>菜單管理</h2>
                    <div>
                        <button class="btn btn-primary" onclick="showUploadMenuModal()">📤 上傳菜單圖片</button>
                        <button class="btn btn-success" onclick="showAddMenuModal()">➕ 新增菜單</button>
                    </div>
                </div>
                
                <div id="menu-container">
                    <!-- 動態內容 -->
                </div>
            </div>
            
            <!-- 餐廳管理 -->
            <div id="restaurants" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>餐廳管理</h2>
                    <button class="btn btn-success" onclick="showAddRestaurantModal()">➕ 新增餐廳</button>
                </div>
                
                <div id="restaurants-container">
                    <!-- 動態內容 -->
                </div>
            </div>
            
            <!-- 用戶管理 -->
            <div id="users" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>用戶管理</h2>
                    <button class="btn btn-primary" onclick="refreshUsers()">🔄 重新整理</button>
                </div>
                
                <div id="users-container">
                    <!-- 動態內容 -->
                </div>
            </div>
            
            <!-- 系統設定 -->
            <div id="settings" class="tab-content">
                <h2 style="margin-bottom: 20px;">每日設定</h2>
                
                <div class="form-group">
                    <label>用餐日期</label>
                    <input type="date" id="setting-meal-date">
                </div>
                
                <div class="form-group">
                    <label>補助金額 (NTD)</label>
                    <input type="number" id="setting-subsidy" value="150">
                </div>
                
                <div class="form-group">
                    <label>訂餐截止時間</label>
                    <input type="time" id="setting-order-end-time" value="11:30">
                </div>
                
                <button class="btn btn-primary" onclick="saveDailySetting()">💾 儲存設定</button>
            </div>
        </div>
    </div>
    
    <!-- Toast 通知 -->
    <div id="toast" class="toast"></div>
    
    <script>
        // API Base URL
        const API_BASE = '/api/admin';
        
        // Tab 切換
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                const tabId = tab.dataset.tab;
                document.getElementById(tabId).classList.add('active');
                
                // 載入對應資料
                loadTabData(tabId);
            });
        });
        
        // 載入 Tab 資料
        async function loadTabData(tabId) {
            switch(tabId) {
                case 'dashboard':
                    await loadDashboard();
                    break;
                case 'orders':
                    await loadOrders();
                    break;
                case 'menu':
                    await loadMenu();
                    break;
                case 'restaurants':
                    await loadRestaurants();
                    break;
                case 'users':
                    await loadUsers();
                    break;
                case 'settings':
                    await loadSettings();
                    break;
            }
        }
        
        // 載入儀表板
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/orders/summary`);
                const data = await response.json();
                
                document.getElementById('total-orders').textContent = data.total_orders || 0;
                document.getElementById('total-amount').textContent = `$${data.total_amount || 0}`;
                document.getElementById('total-subsidy').textContent = `$${data.total_subsidy || 0}`;
                document.getElementById('total-self-pay').textContent = `$${data.total_self_pay || 0}`;
                
                // 餐廳統計
                const statsContainer = document.getElementById('restaurant-stats');
                if (data.restaurant_stats) {
                    statsContainer.innerHTML = Object.entries(data.restaurant_stats).map(([name, stat]) => `
                        <div class="restaurant-stat">
                            <h4>${name}</h4>
                            <div class="count">${stat.count}</div>
                            <div class="amount">${stat.amount} NTD</div>
                        </div>
                    `).join('');
                } else {
                    statsContainer.innerHTML = '<p style="color: #666;">今日暫無訂單</p>';
                }
            } catch (error) {
                showToast('載入資料失敗', 'error');
                console.error(error);
            }
        }
        
        // 載入訂單
        async function loadOrders() {
            const container = document.getElementById('orders-container');
            container.innerHTML = '<div class="loading">載入中</div>';
            
            try {
                const response = await fetch(`${API_BASE}/orders`);
                const data = await response.json();
                
                if (data.orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                            </svg>
                            <p>今日暫無訂單</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>訂單 ID</th>
                                <th>員工</th>
                                <th>菜色</th>
                                <th>餐廳</th>
                                <th>價格</th>
                                <th>補助</th>
                                <th>自付</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.orders.map(order => `
                                <tr>
                                    <td>${order.id}</td>
                                    <td>${order.user_name}<br><small>${order.employee_id}</small></td>
                                    <td>${order.menu_name}</td>
                                    <td>${order.restaurant_name}</td>
                                    <td>$${order.price}</td>
                                    <td>$${order.subsidy_amount}</td>
                                    <td>$${order.self_pay_amount}</td>
                                    <td><span class="status-badge ${order.status}">${getStatusText(order.status)}</span></td>
                                    <td>
                                        <button class="btn btn-success" onclick="confirmOrder(${order.id})">✓</button>
                                        <button class="btn btn-primary" onclick="pickupOrder(${order.id})">📦</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                showToast('載取訂單失敗', 'error');
                console.error(error);
            }
        }
        
        // 確認訂單
        async function confirmOrder(orderId) {
            try {
                const response = await fetch(`${API_BASE}/orders/${orderId}/confirm`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    showToast('訂單已確認', 'success');
                    await loadOrders();
                } else {
                    showToast(data.detail || '確認失敗', 'error');
                }
            } catch (error) {
                showToast('確認失敗', 'error');
                console.error(error);
            }
        }
        
        // 取餐核銷
        async function pickupOrder(orderId) {
            try {
                const response = await fetch(`${API_BASE}/orders/${orderId}/pickup`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    showToast('訂單已核銷', 'success');
                    await loadOrders();
                } else {
                    showToast(data.detail || '核銷失敗', 'error');
                }
            } catch (error) {
                showToast('核銷失敗', 'error');
                console.error(error);
            }
        }
        
        // 載入菜單
        async function loadMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '<div class="loading">載入中</div>';
            
            try {
                const response = await fetch(`${API_BASE}/menu`);
                const data = await response.json();
                
                if (data.menu_items.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <p>今日暫無菜單</p>
                            <button class="btn btn-primary" onclick="showUploadMenuModal()">📤 上傳菜單圖片</button>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>菜色名稱</th>
                                <th>餐廳</th>
                                <th>價格</th>
                                <th>類型</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.menu_items.map(item => `
                                <tr>
                                    <td>${item.id}</td>
                                    <td>${item.name}</td>
                                    <td>${item.restaurant_name}</td>
                                    <td>$${item.price}</td>
                                    <td>${item.food_type === 'vegetarian' ? '素食' : '葷食'}</td>
                                    <td>
                                        <button class="btn btn-danger" onclick="deleteMenuItem(${item.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                showToast('載取菜單失敗', 'error');
                console.error(error);
            }
        }
        
        // 刪除菜單項目
        async function deleteMenuItem(itemId) {
            if (!confirm('確定要刪除此菜單嗎？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/menu/${itemId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    showToast('菜單已刪除', 'success');
                    await loadMenu();
                } else {
                    showToast(data.detail || '刪除失敗', 'error');
                }
            } catch (error) {
                showToast('刪除失敗', 'error');
                console.error(error);
            }
        }
        
        // 載入餐廳
        async function loadRestaurants() {
            const container = document.getElementById('restaurants-container');
            container.innerHTML = '<div class="loading">載入中</div>';
            
            try {
                const response = await fetch(`${API_BASE}/restaurants`);
                const data = await response.json();
                
                if (data.restaurants.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>暫無餐廳資料</p></div>';
                    return;
                }
                
                container.innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>名稱</th>
                                <th>地址</th>
                                <th>聯絡</th>
                                <th>狀態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.restaurants.map(r => `
                                <tr>
                                    <td>${r.id}</td>
                                    <td>${r.name}</td>
                                    <td>${r.address}</td>
                                    <td>${r.contact || '-'}</td>
                                    <td><span class="status-badge ${r.is_active ? 'active' : 'cancelled'}">${r.is_active ? '啟用' : '停用'}</span></td>
                                    <td>
                                        <button class="btn btn-danger" onclick="deactivateRestaurant(${r.id})">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                showToast('載取餐廳失敗', 'error');
                console.error(error);
            }
        }
        
        // 停用餐廳
        async function deactivateRestaurant(restaurantId) {
            if (!confirm('確定要停用此餐廳嗎？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/restaurants/${restaurantId}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    showToast('餐廳已停用', 'success');
                    await loadRestaurants();
                } else {
                    showToast(data.detail || '停用失敗', 'error');
                }
            } catch (error) {
                showToast('停用失敗', 'error');
                console.error(error);
            }
        }
        
        // 載入用戶
        async function loadUsers() {
            const container = document.getElementById('users-container');
            container.innerHTML = '<div class="loading">載入中</div>';
            
            try {
                const response = await fetch(`${API_BASE}/users`);
                const data = await response.json();
                
                if (data.users.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>暫無用戶資料</p></div>';
                    return;
                }
                
                container.innerHTML = `
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>員工編號</th>
                                <th>姓名</th>
                                <th>部門</th>
                                <th>LINE ID</th>
                                <th>狀態</th>
                                <th>管理員</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.users.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td>${u.employee_id}</td>
                                    <td>${u.name}</td>
                                    <td>${u.department || '-'}</td>
                                    <td><small>${u.line_user_id}</small></td>
                                    <td><span class="status-badge ${u.status}">${u.status}</span></td>
                                    <td>${u.is_admin ? '✓' : '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                showToast('載取用戶失敗', 'error');
                console.error(error);
            }
        }
        
        // 載入設定
        async function loadSettings() {
            try {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('setting-meal-date').value = today;
                
                const response = await fetch(`${API_BASE}/settings?meal_date=${today}`);
                const data = await response.json();
                
                if (data.setting) {
                    document.getElementById('setting-subsidy').value = data.setting.subsidy_amount;
                    document.getElementById('setting-order-end-time').value = data.setting.order_end_time || '11:30';
                }
            } catch (error) {
                console.error('載取設定失敗:', error);
            }
        }
        
        // 儲存每日設定
        async function saveDailySetting() {
            const mealDate = document.getElementById('setting-meal-date').value;
            const subsidyAmount = parseFloat(document.getElementById('setting-subsidy').value);
            const orderEndTime = document.getElementById('setting-order-end-time').value;
            
            try {
                const response = await fetch(`${API_BASE}/settings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        meal_date: mealDate,
                        subsidy_amount: subsidyAmount,
                        order_end_time: orderEndTime
                    })
                });
                const data = await response.json();
                
                if (data.status === 'success') {
                    showToast('設定已儲存', 'success');
                } else {
                    showToast(data.detail || '儲存失敗', 'error');
                }
            } catch (error) {
                showToast('儲存失敗', 'error');
                console.error(error);
            }
        }
        
        // Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 狀態文字
        function getStatusText(status) {
            const statusMap = {
                'pending': '待處理',
                'confirmed': '已確認',
                'cancelled': '已取消',
                'picked_up': '已取餐'
            };
            return statusMap[status] || status;
        }
        
        // Modal 相關函數 (待實作)
        function showUploadMenuModal() {
            showToast('圖片上傳功能開發中', 'info');
        }
        
        function showAddMenuModal() {
            showToast('新增菜單功能開發中', 'info');
        }
        
        function showAddRestaurantModal() {
            showToast('新增餐廳功能開發中', 'info');
        }
        
        function refreshOrders() {
            loadOrders();
        }
        
        function refreshUsers() {
            loadUsers();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadDashboard();
        });
    </script>
</body>
</html>
